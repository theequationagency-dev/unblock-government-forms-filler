<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="sky" cx="50%" cy="46%" r="75%">
      <stop offset="0%" stop-color="#FFE7A0"/>
      <stop offset="55%" stop-color="#FFC945"/>
      <stop offset="100%" stop-color="#F59E1B"/>
    </radialGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3A85F"/>
      <stop offset="100%" stop-color="#C6873F"/>
    </linearGradient>
    <linearGradient id="cape" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EA1B30"/>
      <stop offset="100%" stop-color="#A80B1E"/>
    </linearGradient>
    <linearGradient id="trex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FAE52"/>
      <stop offset="100%" stop-color="#2E7D38"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CDEBA6"/>
      <stop offset="100%" stop-color="#A6D383"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF6DA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFF6DA" stop-opacity="0"/>
    </radialGradient>
    <polygon id="ray" points="600,300 495,-520 705,-520"/>
  </defs>

  <!-- background -->
  <rect width="1200" height="675" fill="url(#sky)"/>

  <!-- sunburst rays -->
  <g opacity="0.5">
    <use href="#ray" fill="#FFD766" transform="rotate(0 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(15 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(30 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(45 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(60 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(75 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(90 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(105 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(120 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(135 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(150 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(165 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(180 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(195 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(210 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(225 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(240 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(255 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(270 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(285 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(300 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(315 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(330 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(345 600 300)"/>
  </g>
  <ellipse cx="600" cy="340" rx="500" ry="320" fill="url(#glow)"/>

  <!-- ground -->
  <path d="M0,545 Q600,475 1200,545 L1200,675 L0,675 Z" fill="url(#sand)"/>
  <path d="M0,545 Q600,475 1200,545" fill="none" stroke="#A96E31" stroke-width="4" opacity="0.5"/>

  <!-- ===== BULL (charging from the right) ===== -->
  <g fill="#161616" transform="translate(95,0)">
    <g fill="#F3E4C6" opacity="0.85">
      <ellipse cx="1000" cy="560" rx="46" ry="20"/>
      <ellipse cx="1055" cy="548" rx="30" ry="14"/>
      <ellipse cx="940" cy="565" rx="30" ry="13"/>
    </g>
    <path d="M1085,360 q60,20 55,90 q-4,40 18,70" fill="none" stroke="#161616" stroke-width="12" stroke-linecap="round"/>
    <circle cx="1162" cy="530" r="16"/>
    <ellipse cx="960" cy="410" rx="150" ry="92"/>
    <ellipse cx="855" cy="378" rx="66" ry="70"/>
    <ellipse cx="1070" cy="392" rx="72" ry="78"/>
    <path d="M812,360 Q740,360 705,430 Q690,470 720,492 Q770,505 815,470 Q845,430 855,392 Z"/>
    <ellipse cx="705" cy="452" rx="52" ry="40"/>
    <ellipse cx="668" cy="470" rx="30" ry="24"/>
    <path d="M712,420 Q660,392 626,410 Q660,404 690,432 Z" fill="#F2E8D0" stroke="#161616" stroke-width="3"/>
    <path d="M726,410 Q690,368 706,338 Q718,372 742,406 Z" fill="#F2E8D0" stroke="#161616" stroke-width="3"/>
    <path d="M772,404 q34,-8 40,14 q-24,4 -40,-2 Z"/>
    <ellipse cx="726" cy="440" rx="9" ry="6" fill="#fff"/>
    <circle cx="729" cy="441" r="4" fill="#161616"/>
    <path d="M712,428 L742,436" stroke="#161616" stroke-width="5" stroke-linecap="round"/>
    <path d="M885,485 l-30,88 l24,0 l30,-80 Z"/>
    <path d="M935,492 l14,86 l24,0 l-6,-84 Z"/>
    <path d="M1040,486 l-16,88 l24,0 l16,-82 Z"/>
    <path d="M1092,486 l26,80 l24,0 l-24,-84 Z"/>
    <g fill="#ffffff" opacity="0.9">
      <circle cx="628" cy="452" r="10"/>
      <circle cx="606" cy="446" r="8"/>
      <circle cx="588" cy="440" r="6"/>
    </g>
  </g>

  <!-- ===== T-REX MATADOR (GUILTY TREX) ===== -->
  <g stroke="#1c4a24" stroke-width="4" stroke-linejoin="round">
    <!-- tail -->
    <path d="M250,440 C150,452 66,420 30,346 C 26,336 40,330 48,340 C 100,398 176,412 250,404 Z" fill="url(#trex)"/>
    <!-- back leg -->
    <path d="M214,452 C206,506 200,540 206,556 L250,556 C252,516 250,484 258,452 Z" fill="#2E7D38"/>
    <path d="M196,552 l70,0 l-4,16 l-14,-8 l-10,10 l-12,-8 l-12,10 l-8,-10 Z" fill="#2E7D38"/>
    <!-- body -->
    <ellipse cx="250" cy="424" rx="94" ry="108" fill="url(#trex)"/>
    <!-- front leg -->
    <path d="M272,470 C270,516 272,544 280,558 L322,556 C320,520 312,486 314,458 Z" fill="#3E9646"/>
    <path d="M270,552 l72,0 l-4,16 l-14,-8 l-10,10 l-12,-8 l-12,10 l-8,-10 Z" fill="#3E9646"/>
    <!-- belly panel -->
    <path d="M300,352 C 338,410 330,502 286,548 C 316,472 304,404 286,360 Z" fill="url(#belly)" stroke="none"/>
    <!-- neck / chest to head -->
    <path d="M292,372 C 300,326 330,300 358,296 L384,352 C 356,360 326,384 306,420 Z" fill="url(#trex)"/>
    <!-- tiny arm holding cape -->
    <path d="M320,388 q42,2 74,16 l-8,20 q-34,-14 -70,-14 Z" fill="#3E9646"/>
    <path d="M392,404 l16,4 M392,412 l16,2 M392,420 l14,2" stroke="#F2E8D0" stroke-width="4" stroke-linecap="round"/>
    <!-- head -->
    <path d="M320,296 C 344,262 430,258 470,286 C 480,293 480,306 470,312 L360,338 C 332,332 320,314 320,296 Z" fill="url(#trex)"/>
    <!-- mouth interior -->
    <path d="M366,330 C 410,344 452,340 470,312 C 468,352 410,368 366,354 Z" fill="#6a1220" stroke="none"/>
    <!-- lower jaw -->
    <path d="M362,330 C 404,346 448,344 470,314 C 470,360 404,372 360,358 Z" fill="url(#trex)"/>
    <!-- upper teeth -->
    <g fill="#ffffff" stroke="none">
      <path d="M372,326 l10,2 l-3,14 Z"/>
      <path d="M392,330 l10,1 l-3,15 Z"/>
      <path d="M414,331 l10,0 l-3,15 Z"/>
      <path d="M436,329 l10,-1 l-2,14 Z"/>
    </g>
    <!-- lower teeth -->
    <g fill="#ffffff" stroke="none">
      <path d="M384,352 l9,1 l-2,-12 Z"/>
      <path d="M408,355 l9,0 l-2,-12 Z"/>
      <path d="M432,353 l9,-1 l-2,-12 Z"/>
    </g>
    <!-- nostril -->
    <ellipse cx="456" cy="292" rx="6" ry="4" fill="#1c4a24" stroke="none"/>
    <!-- eye -->
    <circle cx="372" cy="292" r="13" fill="#ffffff"/>
    <circle cx="377" cy="294" r="6" fill="#161616" stroke="none"/>
    <path d="M356,278 L388,286" stroke="#1c4a24" stroke-width="6" stroke-linecap="round"/>
    <!-- montera (matador hat) -->
    <path d="M332,268 Q334,242 362,242 Q390,242 392,268 Q362,258 332,268 Z" fill="#191927"/>
    <circle cx="338" cy="260" r="10" fill="#191927"/>
    <circle cx="386" cy="260" r="10" fill="#191927"/>
    <!-- gold matador sash -->
    <path d="M300,430 q34,18 74,6 l-6,26 q-40,10 -74,-8 Z" fill="#F4C13A" stroke="#c8971c" stroke-width="3"/>
  </g>

  <!-- ===== BIG MULETA (cape) with the app name ===== -->
  <g>
    <path d="M300,360 L500,318" stroke="#6b4a2a" stroke-width="8" stroke-linecap="round"/>
    <path d="M360,368
             C 450,296 620,286 712,338
             C 762,368 762,474 720,526
             C 672,574 536,576 452,548
             C 536,514 536,430 484,398
             C 536,378 452,356 360,368 Z"
          fill="url(#cape)" stroke="#8f0a1a" stroke-width="3"/>
    <path d="M420,352 C 500,352 548,420 512,502" fill="none" stroke="#9c0f1e" stroke-width="7" opacity="0.55"/>
    <path d="M540,320 C 600,352 622,442 592,520" fill="none" stroke="#9c0f1e" stroke-width="7" opacity="0.45"/>
    <g transform="rotate(-8 560 440)" fill="#ffffff" text-anchor="middle" font-weight="900">
      <text x="560" y="410" font-size="52" letter-spacing="1">UNBLOCK</text>
      <text x="560" y="460" font-size="42" letter-spacing="1">GOVERNMENT</text>
      <text x="560" y="508" font-size="52" letter-spacing="1">FORMS</text>
    </g>
  </g>

  <!-- ===== TEXT ===== -->
  <g text-anchor="middle">
    <text x="600" y="112" font-size="108" font-weight="900" fill="#ffffff" stroke="#B00d20" stroke-width="6" paint-order="stroke" transform="rotate(-3 600 100)">¡OLÉ!</text>
    <text x="600" y="158" font-size="26" font-weight="800" fill="#7a1010" letter-spacing="2" transform="rotate(-3 600 100)">TO EVERYONE WHO TRIED TO BLOCK US</text>
  </g>
  <text x="600" y="632" text-anchor="middle" font-size="30" font-weight="900" fill="#16213e" letter-spacing="4">by  GUILTY  TREX</text>
</svg>
