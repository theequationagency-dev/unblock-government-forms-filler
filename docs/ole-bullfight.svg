<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="sky" cx="50%" cy="46%" r="75%">
      <stop offset="0%" stop-color="#FFE7A0"/>
      <stop offset="55%" stop-color="#FFC945"/>
      <stop offset="100%" stop-color="#F59E1B"/>
    </radialGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3A85F"/>
      <stop offset="100%" stop-color="#C6873F"/>
    </linearGradient>
    <linearGradient id="cape" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E4162B"/>
      <stop offset="100%" stop-color="#B00d20"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF6DA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFF6DA" stop-opacity="0"/>
    </radialGradient>
    <polygon id="ray" points="600,300 495,-520 705,-520"/>
  </defs>

  <!-- background -->
  <rect width="1200" height="675" fill="url(#sky)"/>

  <!-- sunburst rays -->
  <g opacity="0.55">
    <use href="#ray" fill="#FFD766" transform="rotate(0 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(15 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(30 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(45 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(60 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(75 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(90 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(105 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(120 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(135 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(150 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(165 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(180 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(195 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(210 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(225 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(240 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(255 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(270 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(285 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(300 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(315 600 300)"/>
    <use href="#ray" fill="#FFD766" transform="rotate(330 600 300)"/>
    <use href="#ray" fill="#F8BE3C" transform="rotate(345 600 300)"/>
  </g>
  <ellipse cx="600" cy="330" rx="460" ry="300" fill="url(#glow)"/>

  <!-- ground -->
  <path d="M0,545 Q600,475 1200,545 L1200,675 L0,675 Z" fill="url(#sand)"/>
  <path d="M0,545 Q600,475 1200,545" fill="none" stroke="#A96E31" stroke-width="4" opacity="0.5"/>

  <!-- ===== BULL (charging from the right toward the cape) ===== -->
  <g fill="#161616">
    <!-- dust puffs -->
    <g fill="#F3E4C6" opacity="0.85">
      <ellipse cx="1000" cy="560" rx="46" ry="20"/>
      <ellipse cx="1055" cy="548" rx="30" ry="14"/>
      <ellipse cx="940" cy="565" rx="30" ry="13"/>
    </g>
    <!-- tail -->
    <path d="M1085,360 q60,20 55,90 q-4,40 18,70" fill="none" stroke="#161616" stroke-width="12" stroke-linecap="round"/>
    <circle cx="1162" cy="530" r="16"/>
    <!-- body -->
    <ellipse cx="960" cy="410" rx="150" ry="92"/>
    <!-- shoulder hump -->
    <ellipse cx="855" cy="378" rx="66" ry="70"/>
    <!-- hind -->
    <ellipse cx="1070" cy="392" rx="72" ry="78"/>
    <!-- neck to head (lowered, charging left) -->
    <path d="M812,360 Q740,360 705,430 Q690,470 720,492 Q770,505 815,470 Q845,430 855,392 Z"/>
    <!-- head/snout -->
    <ellipse cx="705" cy="452" rx="52" ry="40"/>
    <ellipse cx="668" cy="470" rx="30" ry="24"/>
    <!-- horns (pointing forward-left) -->
    <path d="M712,420 Q660,392 626,410 Q660,404 690,432 Z" fill="#F2E8D0" stroke="#161616" stroke-width="3"/>
    <path d="M726,410 Q690,368 706,338 Q718,372 742,406 Z" fill="#F2E8D0" stroke="#161616" stroke-width="3"/>
    <!-- ear -->
    <path d="M772,404 q34,-8 40,14 q-24,4 -40,-2 Z"/>
    <!-- angry eye -->
    <ellipse cx="726" cy="440" rx="9" ry="6" fill="#fff"/>
    <circle cx="729" cy="441" r="4" fill="#161616"/>
    <path d="M712,428 L742,436" stroke="#161616" stroke-width="5" stroke-linecap="round"/>
    <!-- legs (running) -->
    <path d="M885,485 l-30,88 l24,0 l30,-80 Z"/>
    <path d="M935,492 l14,86 l24,0 l-6,-84 Z"/>
    <path d="M1040,486 l-16,88 l24,0 l16,-82 Z"/>
    <path d="M1092,486 l26,80 l24,0 l-24,-84 Z"/>
    <!-- nostril steam puffs -->
    <g fill="#ffffff" opacity="0.9">
      <circle cx="628" cy="452" r="10"/>
      <circle cx="606" cy="446" r="8"/>
      <circle cx="588" cy="440" r="6"/>
    </g>
  </g>

  <!-- ===== MULETA (red cape) with the app name ===== -->
  <g>
    <!-- stick (estoque) held across -->
    <path d="M300,300 L470,250" stroke="#6b4a2a" stroke-width="7" stroke-linecap="round"/>
    <!-- cape cloth billowing to the right -->
    <path d="M300,300
             C 360,250 470,235 560,270
             C 600,285 610,360 585,430
             C 560,500 470,520 405,505
             C 470,470 470,400 430,360
             C 470,330 400,300 300,300 Z"
          fill="url(#cape)" stroke="#8f0a1a" stroke-width="3"/>
    <!-- fold shading -->
    <path d="M360,300 C 430,300 470,360 440,430" fill="none" stroke="#9c0f1e" stroke-width="6" opacity="0.6"/>
    <path d="M470,275 C 520,300 540,380 515,450" fill="none" stroke="#9c0f1e" stroke-width="6" opacity="0.5"/>
    <!-- app name on the cape -->
    <g transform="rotate(-9 460 375)" fill="#ffffff" text-anchor="middle" font-weight="900">
      <text x="460" y="345" font-size="40" letter-spacing="1">UNBLOCK</text>
      <text x="460" y="388" font-size="34" letter-spacing="1">GOVERNMENT</text>
      <text x="460" y="428" font-size="40" letter-spacing="1">FORMS</text>
    </g>
  </g>

  <!-- ===== MATADOR (left, holding the cape) ===== -->
  <g fill="#16213e">
    <!-- back leg -->
    <path d="M232,468 l-30,96 l22,0 l34,-92 Z"/>
    <!-- front leg -->
    <path d="M258,470 l22,98 l22,0 l-16,-96 Z"/>
    <!-- shoes -->
    <ellipse cx="212" cy="566" rx="20" ry="9" fill="#0c1226"/>
    <ellipse cx="290" cy="568" rx="20" ry="9" fill="#0c1226"/>
    <!-- torso / jacket -->
    <path d="M230,300 Q210,380 236,472 L286,472 Q300,380 282,300 Q256,286 230,300 Z"/>
    <!-- gold trim -->
    <g fill="none" stroke="#FFD54A" stroke-width="4" opacity="0.95">
      <path d="M256,306 L256,466"/>
      <path d="M238,330 q18,10 36,0"/>
      <path d="M238,370 q18,10 36,0"/>
      <path d="M238,410 q18,10 36,0"/>
    </g>
    <circle cx="256" cy="470" r="5" fill="#FFD54A"/>
    <!-- extended arm to the cape -->
    <path d="M276,318 Q330,300 380,286 L392,300 Q336,322 284,344 Z"/>
    <!-- raised arm with sword -->
    <path d="M234,316 Q196,300 176,262 L190,252 Q214,290 250,300 Z"/>
    <path d="M176,262 L150,214" stroke="#d9d9e3" stroke-width="6" stroke-linecap="round"/>
    <!-- neck + head -->
    <rect x="246" y="284" width="20" height="18" rx="6"/>
    <circle cx="256" cy="268" r="24" fill="#e8b98f"/>
    <!-- montera hat -->
    <path d="M230,258 Q232,232 256,232 Q280,232 282,258 Q256,250 230,258 Z"/>
    <circle cx="234" cy="252" r="9"/>
    <circle cx="278" cy="252" r="9"/>
  </g>

  <!-- ===== TEXT ===== -->
  <g text-anchor="middle">
    <text x="600" y="112" font-size="108" font-weight="900" fill="#ffffff" stroke="#B00d20" stroke-width="6" paint-order="stroke" transform="rotate(-3 600 100)">¡OLÉ!</text>
    <text x="600" y="158" font-size="26" font-weight="800" fill="#7a1010" letter-spacing="2" transform="rotate(-3 600 100)">TO EVERYONE WHO TRIED TO BLOCK US</text>
  </g>
  <text x="600" y="628" text-anchor="middle" font-size="30" font-weight="900" fill="#16213e" letter-spacing="4">by  GUILTY  TREX</text>
</svg>
